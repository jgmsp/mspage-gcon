<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MSP Flight Board</title>
    <script>
      try {
        const theme = localStorage.getItem("mspage-gcon-theme");
        if (theme) {
          document.documentElement.dataset.theme = theme;
        }
      } catch (error) {
        console.warn("Theme preference unavailable.", error);
      }
    </script>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow-row">
          <p class="eyebrow">Terminal 1</p>
          <p class="eyebrow-meta" id="last-updated-inline">Awaiting snapshot</p>
        </div>
        <div class="hero-heading">
          <div class="hero-copy">
            <h1>Concourse G</h1>
            <p class="lede">
              Departures snapshot for G.
            </p>
          </div>
          <div class="theme-inline">
            <button type="button" class="theme-cycle" id="theme-cycle" aria-label="Cycle theme">
              <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="hero-toolbar">
          <span class="toolbar-label">Filter</span>
          <div class="pod-filters" id="pod-filters" aria-label="Board filters"></div>
        </div>
      </section>

      <section class="board">
        <div class="board-header">
          <div class="board-heading">
            <h2 id="board-title">Operations View</h2>
            <p class="board-count" id="visible-count">Flights: 0</p>
          </div>
          <div class="board-actions">
            <p class="board-note hidden" id="board-note"></p>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="departures-head"></thead>
            <tbody id="departures-body"></tbody>
          </table>
          <div class="empty-state hidden" id="empty-state">No departures match this view.</div>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
