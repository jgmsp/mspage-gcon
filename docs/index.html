<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>401</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --frame: rgba(255, 255, 255, 0.08);
      }

      html, body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        overflow: hidden;
      }

      .photo {
        width: min(100vw, 1000px);
        height: min(100vh, 1000px);
        display: grid;
        place-items: center;
        padding: clamp(12px, 2vw, 24px);
        box-sizing: border-box;
      }

      img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
        border: 1px solid var(--frame);
        background: #000;
      }
    </style>
  </head>
  <body>
    <main class="photo" aria-label="401 photo">
      <img src="assets/401.jpg" alt="401 unauthorized poster with a cat">
    </main>
  </body>
</html>
