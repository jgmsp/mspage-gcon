name: Publish MSP Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -t .

      - name: Generate latest snapshot
        run: python -m mspage_gcon --output-dir docs --pod-config config/pods.json --respect-schedule

      - name: Commit generated files
        run: |
          if [ -z "$(git status --porcelain docs)" ]; then
            echo "No generated file changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Update MSP G-concourse snapshot"
          git push
