name: Publish MSP Snapshot

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run in scheduled mode or force a fresh publish now"
        required: true
        default: fresh
        type: choice
        options:
          - fresh
          - scheduled
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -t .

      - name: Generate latest snapshot
        env:
          RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mode || 'scheduled' }}
        run: |
          if [ "$RUN_MODE" = "fresh" ]; then
            python -m mspage_gcon --output-dir docs --pod-config config/pods.json --force-finance-update
          else
            python -m mspage_gcon --output-dir docs --pod-config config/pods.json --respect-schedule
          fi

      - name: Commit generated files
        run: |
          if [ -z "$(git status --porcelain docs)" ]; then
            echo "No generated file changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Update MSP G-concourse snapshot"
          git push
